<!-- ========== REGEX TOOL JAVASCRIPT (encapsulated IIFE) ========== -->
<script>
  (function() {
    'use strict';

    // ---- DOM refs ----
    const patternInput = document.getElementById('regex-pattern');
    const testString = document.getElementById('regex-teststring');
    const flagBtns = document.querySelectorAll('.regex-flag-btn');
    const matchBtn = document.getElementById('regex-match-btn');
    const clearBtn = document.getElementById('regex-clear-btn');
    const resultsContainer = document.getElementById('regex-results');
    const errorBox = document.getElementById('regex-error-box');
    const errorText = document.getElementById('regex-error-text');
    const resultsBox = document.getElementById('regex-results-box');
    const matchCountSpan = document.getElementById('regex-match-count');
    const matchList = document.getElementById('regex-match-list');

    // ---- helpers ----
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function getActiveFlags() {
      const active = [];
      flagBtns.forEach(btn => {
        if (btn.classList.contains('active')) {
          active.push(btn.dataset.flag);
        }
      });
      return active.join('');
    }

    function showError(message) {
      errorText.textContent = message;
      errorBox.classList.add('visible');
      resultsBox.classList.remove('visible');
      resultsContainer.classList.add('visible');
    }

    function hideError() {
      errorBox.classList.remove('visible');
    }

    function showResults(matches) {
      hideError();
      resultsContainer.classList.add('visible');
      resultsBox.classList.add('visible');

      const count = matches.length;
      matchCountSpan.textContent = count;
      matchCountSpan.className = 'regex-stat-badge' + (count > 0 ? ' has-matches' : '');

      if (count === 0) {
        matchList.innerHTML = '<li class="regex-no-match">• No matches found.</li>';
        return;
      }

      let html = '';
      matches.forEach((m, i) => {
        const display = m === '' ? '<em style="color:#B88A5E;">empty</em>' : escapeHtml(m);
        html += `
          <li class="regex-match-item">
            <span class="regex-match-num">${i + 1}</span>
            <code class="regex-match-chip">${display}</code>
          </li>
        `;
      });
      matchList.innerHTML = html;
    }

    // ---- core: run match ----
    function runMatch() {
      const pattern = patternInput.value.trim();
      const text = testString.value;

      // reset UI
      hideError();
      resultsContainer.classList.remove('visible');
      resultsBox.classList.remove('visible');

      // validation
      if (!pattern) {
        showError('Please enter a regex pattern.');
        return;
      }

      let re;
      try {
        re = new RegExp(pattern, getActiveFlags());
      } catch (err) {
        showError('Invalid regular expression: ' + err.message);
        return;
      }

      // execute
      const matches = [];
      if (re.flags.includes('g')) {
        let m;
        const safe = new RegExp(re.source, re.flags);
        while ((m = safe.exec(text)) !== null) {
          matches.push(m[0]);
          if (m[0].length === 0) safe.lastIndex++; // avoid infinite loop on zero-length
        }
      } else {
        const m = re.exec(text);
        if (m) matches.push(m[0]);
      }

      showResults(matches);
    }

    // ---- clear everything ----
    function clearAll() {
      patternInput.value = '';
      testString.value = '';
      resultsContainer.classList.remove('visible');
      resultsBox.classList.remove('visible');
      hideError();
      // reset match list to empty state
      matchList.innerHTML = '<li class="regex-no-match">• No matches found.</li>';
      matchCountSpan.textContent = '0';
      matchCountSpan.className = 'regex-stat-badge';
    }

    // ---- flag toggle (using event delegation) ----
    function toggleFlag(btn) {
      btn.classList.toggle('active');
    }

    // ---- event listeners (no inline onclick) ----
    matchBtn.addEventListener('click', runMatch);

    clearBtn.addEventListener('click', clearAll);

    flagBtns.forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleFlag(this);
      });
    });

    // Enter key on pattern input triggers match
    patternInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        runMatch();
      }
    });

    // Ctrl+Enter on textarea also triggers match
    testString.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        runMatch();
      }
    });

    // ---- expose public API if needed (but keep scoped) ----
    // For debugging only – not required.
    // window.__regexTool = { runMatch, clearAll };

    console.log('✅ Regex tool initialized (clean, scoped, event-driven)');
  })();
</script>
